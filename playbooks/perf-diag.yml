---
# Playbook: Gather host-side performance diagnostics from k3s nodes
# Usage: ansible-playbook -i inventory/k3s-cluster.yml playbooks/perf-diag.yml

- name: Gather k3s cluster performance diagnostics
  hosts: k3s_cluster
  gather_facts: true
  become: true
  serial: "{{ perf_diag_serial | default('100%') }}"

  roles:
    - perf_diag

- name: Gather bastion performance diagnostics
  hosts: k3s_bastion
  gather_facts: true
  become: true

  roles:
    - perf_diag
