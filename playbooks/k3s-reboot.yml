---
# Playbook: Reboot k3s cluster nodes safely
# Usage: ansible-playbook k3s-reboot.yml
#
# This playbook performs graceful reboots of k3s cluster nodes with proper
# workload orchestration (cordon, drain, reboot, uncordon) to maintain
# cluster availability during reboots.
#
# Requirements:
# - Run manually by human: cordon/drain/uncordon node from bastion with kubectl
#
# Use this after system updates that require reboots.

- name: Reboot k3s Cluster Nodes
  hosts: k3s_cluster
  gather_facts: false
  become: true
  serial: 1  # Reboot one node at a time to maintain cluster availability

  tasks:
    - name: Check if reboot is required
      ansible.builtin.stat:
        path: /var/run/reboot-required
      register: reboot_required_file
      tags:
        - reboot
        - check

    - name: Display reboot status
      ansible.builtin.debug:
        msg: "{{ inventory_hostname }}: Reboot {{ 'REQUIRED' if reboot_required_file.stat.exists else 'NOT REQUIRED' }}"
      tags:
        - reboot
        - check

    - name: "Run manually by human: cordon and drain node from bastion"
      ansible.builtin.debug:
        msg:
          - "Run manually by human on k3s-bastion-01 before rebooting {{ inventory_hostname }}:"
          - "kubectl cordon {{ inventory_hostname }}"
          - "kubectl drain {{ inventory_hostname }} --ignore-daemonsets --delete-emptydir-data --timeout=300s"
      when: reboot_required_file.stat.exists
      tags:
        - reboot
        - drain

    - name: Require manual kubectl drain confirmation before reboot
      ansible.builtin.pause:
        prompt: "Run manually by human: confirm {{ inventory_hostname }} is cordoned and drained, then press Enter to continue."
      when: reboot_required_file.stat.exists
      tags:
        - reboot
        - drain

    - name: Reboot the node
      ansible.builtin.reboot:
        reboot_timeout: 600
        msg: "Rebooting {{ inventory_hostname }} for system updates"
        pre_reboot_delay: 5
        post_reboot_delay: 30
      when: reboot_required_file.stat.exists
      tags:
        - reboot

    - name: Wait for node to come back online
      ansible.builtin.wait_for_connection:
        timeout: 300
        delay: 10
      when: reboot_required_file.stat.exists
      tags:
        - reboot

    - name: Verify node is responsive
      ansible.builtin.ping:
      when: reboot_required_file.stat.exists
      tags:
        - reboot

    - name: "Run manually by human: uncordon node from bastion"
      ansible.builtin.debug:
        msg:
          - "Run manually by human on k3s-bastion-01 after {{ inventory_hostname }} is back:"
          - "kubectl uncordon {{ inventory_hostname }}"
          - "kubectl get node {{ inventory_hostname }}"
      when: reboot_required_file.stat.exists
      tags:
        - reboot
        - uncordon

    - name: Require manual kubectl readiness verification before moving on
      ansible.builtin.pause:
        prompt: "Run manually by human: verify {{ inventory_hostname }} is Ready in the cluster, then press Enter to continue."
      when: reboot_required_file.stat.exists
      tags:
        - reboot
        - verify

    - name: Display completion status
      ansible.builtin.debug:
        msg: "{{ inventory_hostname }}: {{ 'Rebooted successfully and back in cluster' if reboot_required_file.stat.exists else 'No reboot needed' }}"
      tags:
        - reboot

- name: Reboot Bastion Node
  hosts: k3s_bastion
  gather_facts: false
  become: true

  tasks:
    - name: Check if reboot is required
      ansible.builtin.stat:
        path: /var/run/reboot-required
      register: reboot_required_file
      tags:
        - reboot
        - check

    - name: Display reboot status
      ansible.builtin.debug:
        msg: "{{ inventory_hostname }}: Reboot {{ 'REQUIRED' if reboot_required_file.stat.exists else 'NOT REQUIRED' }}"
      tags:
        - reboot
        - check

    - name: Reboot the bastion
      ansible.builtin.reboot:
        reboot_timeout: 600
        msg: "Rebooting {{ inventory_hostname }} for system updates"
        pre_reboot_delay: 5
        post_reboot_delay: 30
      when: reboot_required_file.stat.exists
      tags:
        - reboot

    - name: Wait for bastion to come back online
      ansible.builtin.wait_for_connection:
        timeout: 300
        delay: 10
      when: reboot_required_file.stat.exists
      tags:
        - reboot

    - name: Verify bastion is responsive
      ansible.builtin.ping:
      when: reboot_required_file.stat.exists
      tags:
        - reboot

    - name: Display completion status
      ansible.builtin.debug:
        msg: "{{ inventory_hostname }}: {{ 'Rebooted successfully' if reboot_required_file.stat.exists else 'No reboot needed' }}"
      tags:
        - reboot
