---
hypervisor_critical_guests:
  - k3s-cp-01
  - k3s-bastion-01
  - k3s-worker-01
  - k3s-worker-02

hypervisor_shutdown_sequence:
  - k3s-worker-01
  - k3s-worker-02
  - k3s-cp-01
  - k3s-bastion-01

hypervisor_startup_sequence:
  - k3s-cp-01
  - k3s-bastion-01
  - k3s-worker-01
  - k3s-worker-02

hypervisor_libvirt_uri: qemu:///system
hypervisor_enforce_critical_autostart: false
